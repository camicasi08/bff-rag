services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bff_postgres
    environment:
      POSTGRES_DB: bff_rag
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bff_rag"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bff_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: bff_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama pull nomic-embed-text
        ollama pull llama3.1:8b
        echo "Models ready"
    environment:
      OLLAMA_HOST: http://ollama:11434

  rag-service:
    build:
      context: ./rag-service
    container_name: bff_rag_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@postgres:5432/bff_rag
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: nomic-embed-text
      LLM_MODEL: llama3.1:8b
      EMBED_DIMS: "768"
      CACHE_THRESHOLD: "0.92"
      CACHE_TTL: "3600"
      TOP_K_RETRIEVE: "20"
      TOP_K_RERANK: "5"
      INGEST_JOB_TTL: "3600"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20

  bff:
    build:
      context: ./bff
    container_name: bff_gateway
    depends_on:
      rag-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAG_SERVICE_URL: http://rag-service:8000
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-secret-change-in-prod
      NODE_ENV: development
      QUERY_RATE_LIMIT_MAX: "30"
      QUERY_RATE_LIMIT_WINDOW_MS: "60000"
      STREAM_RATE_LIMIT_MAX: "10"
      STREAM_RATE_LIMIT_WINDOW_MS: "60000"
      HISTORY_RATE_LIMIT_MAX: "30"
      HISTORY_RATE_LIMIT_WINDOW_MS: "60000"
      ADMIN_RATE_LIMIT_MAX: "20"
      ADMIN_RATE_LIMIT_WINDOW_MS: "60000"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --header='Content-Type: application/json' --post-data='{\"query\":\"{ __typename }\"}' http://localhost:3000/graphql >/dev/null",
        ]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  postgres_data:
  ollama_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bff_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bff_rag}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-postgres-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bff_rag"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bff_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: bff_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama pull nomic-embed-text
        ollama pull llama3.1:8b
        echo "Models ready"
    environment:
      OLLAMA_HOST: http://ollama:11434

  rag-service:
    build:
      context: ./backend/rag-service
    container_name: bff_rag_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://admin:change-me-local-postgres-password@postgres:5432/bff_rag}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      LLM_MODEL: ${LLM_MODEL:-llama3.1:8b}
      FAST_LLM_MODEL: ${FAST_LLM_MODEL:-}
      EMBED_DIMS: "${EMBED_DIMS:-768}"
      CACHE_THRESHOLD: "${CACHE_THRESHOLD:-0.92}"
      CACHE_TTL: "${CACHE_TTL:-3600}"
      CACHE_LOOKUP_MAX_CANDIDATES: "${CACHE_LOOKUP_MAX_CANDIDATES:-25}"
      TOP_K_RETRIEVE: "${TOP_K_RETRIEVE:-8}"
      TOP_K_RERANK: "${TOP_K_RERANK:-3}"
      RERANK_DIRECT_HIT_THRESHOLD: "${RERANK_DIRECT_HIT_THRESHOLD:-0.85}"
      QUERY_HISTORY_LIMIT: "${QUERY_HISTORY_LIMIT:-4}"
      QUERY_MAX_CONTEXT_TOKENS: "${QUERY_MAX_CONTEXT_TOKENS:-1024}"
      QUERY_MAX_HISTORY_TOKENS: "${QUERY_MAX_HISTORY_TOKENS:-256}"
      QUERY_MAX_CONTEXT_CHARS: "${QUERY_MAX_CONTEXT_CHARS:-2400}"
      QUERY_MAX_HISTORY_CHARS: "${QUERY_MAX_HISTORY_CHARS:-800}"
      RERANK_MIN_CANDIDATES: "${RERANK_MIN_CANDIDATES:-5}"
      EMBED_BATCH_SIZE: "${EMBED_BATCH_SIZE:-16}"
      INGEST_JOB_TTL: "${INGEST_JOB_TTL:-3600}"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20

  bff:
    build:
      context: ./backend/bff
    container_name: bff_gateway
    depends_on:
      rag-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://rag-service:8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-local-dev-jwt-secret}
      NODE_ENV: ${NODE_ENV:-development}
      HTTP_BODY_LIMIT: ${HTTP_BODY_LIMIT:-10mb}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
      QUERY_RATE_LIMIT_MAX: "${QUERY_RATE_LIMIT_MAX:-30}"
      QUERY_RATE_LIMIT_WINDOW_MS: "${QUERY_RATE_LIMIT_WINDOW_MS:-60000}"
      STREAM_RATE_LIMIT_MAX: "${STREAM_RATE_LIMIT_MAX:-10}"
      STREAM_RATE_LIMIT_WINDOW_MS: "${STREAM_RATE_LIMIT_WINDOW_MS:-60000}"
      HISTORY_RATE_LIMIT_MAX: "${HISTORY_RATE_LIMIT_MAX:-30}"
      HISTORY_RATE_LIMIT_WINDOW_MS: "${HISTORY_RATE_LIMIT_WINDOW_MS:-60000}"
      ADMIN_RATE_LIMIT_MAX: "${ADMIN_RATE_LIMIT_MAX:-20}"
      ADMIN_RATE_LIMIT_WINDOW_MS: "${ADMIN_RATE_LIMIT_WINDOW_MS:-60000}"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --header='Content-Type: application/json' --post-data='{\"query\":\"{ __typename }\"}' http://localhost:3000/graphql >/dev/null",
        ]
      interval: 15s
      timeout: 10s
      retries: 20

  frontend:
    build:
      context: ./frontend
    container_name: bff_frontend
    depends_on:
      bff:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_BFF_URL: ${NEXT_PUBLIC_BFF_URL:-http://localhost:3000}
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  ollama_data:

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan repository for secrets
        run: bash backend/scripts/scan_secrets.sh --all

  python-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rag-service dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/rag-service/requirements.txt

      - name: Run rag-service unit tests
        run: python -m unittest discover -s backend/rag-service/tests -v

  bff-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/bff
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/bff/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run BFF tests
        run: npm test

      - name: Build BFF
        run: npm run build

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config
